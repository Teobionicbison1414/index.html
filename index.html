<!DOCTYPE html>
<html lang="en">
<head>

  <title>Target Randomizer (PIN Version)</title>
  <style>

    .container {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 18px;
    }
    button {
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;

</head>
