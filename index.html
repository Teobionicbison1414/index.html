<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Randomizer (PIN Version)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;

      /* BACKGROUND IMAGE — must be in same folder */
      background-image: url("bart-simpson-bart-simpson-simpson-bart-simpsons.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      /* DARK OVERLAY FOR READABILITY */
      position: relative;
    }

    /* Overlay layer */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: rgba(255,255,255,0.9);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
      color: #000;
    }

    .stepBox {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    .stepBox button {
      width: 45%;
      margin: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Target Randomizer</h1>

    <input id="codeInput" type="text" placeholder="Enter your code">
    <button onclick="startAssignment()">START</button>

    <div id="result"></div>

    <!-- Identity Confirmation -->
    <div id="confirmIdentity" class="stepBox">
      <p id="identityQuestion"></p>
      <button onclick="confirmIdentity(true)">Yes</button>
      <button onclick="confirmIdentity(false)">No</button>
    </div>

    <!-- Ready Check -->
    <div id="readyCheck" class="stepBox">
      <p>Are you ready to see your target?</p>
      <button onclick="confirmReady(true)">Yes</button>
      <button onclick="confirmReady(false)">No</button>
    </div>
  </div>

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const assignments = {
      "Kayden Hall": "Lucas Forker",
      "Lucas Forker": "Trevor James",
      "Trevor James": "Gabriel Medina",
      "Gabriel Medina": "Ben Elder",
      "Ben Elder": "Nick Haskins",
      "Nick Haskins": "Aaron Joseph",
      "Aaron Joseph": "Jackson Neubauer",
      "Jackson Neubauer": "Bianca Illescas Villa",
      "Bianca Illescas Villa": "Max Gotcher",
      "Max Gotcher": "Madison Dodge",
      "Madison Dodge": "Nolan Garrison",
      "Nolan Garrison": "Brysun Perry",
      "Brysun Perry": "Jack Smith",
      "Jack Smith": "David Sheldon",
      "David Sheldon": "Angelina Bryk",
      "Angelina Bryk": "Nicole Semenchuck",
      "Nicole Semenchuck": "Charlotte Humphrey",
      "Charlotte Humphrey": "Kayden Hall"
    };

    const pins = {
      "482193": "Kayden Hall",
      "917540": "Lucas Forker",
      "603821": "Trevor James",
      "284915": "Gabriel Medina",
      "759402": "Ben Elder",
      "136874": "Nick Haskins",
      "820457": "Aaron Joseph",
      "594318": "Jackson Neubauer",
      "218769": "Bianca Illescas Villa",
      "847120": "Max Gotcher",
      "310586": "Madison Dodge",
      "965204": "Nolan Garrison",
      "421978": "Brysun Perry",
      "703419": "Jack Smith",
      "558602": "David Sheldon",
      "892731": "Angelina Bryk",
      "147860": "Nicole Semenchuck",
      "639254": "Charlotte Humphrey"
    };

    let currentPerson = null;
    let currentTarget = null;

    function startAssignment() {
      const code = document.getElementById("codeInput").value.trim();
      const result = document.getElementById("result");

      document.getElementById("confirmIdentity").style.display = "none";
      document.getElementById("readyCheck").style.display = "none";
      result.textContent = "";

      if (!pins[code]) {
        result.textContent = "Invalid code.";
        return;
      }

      currentPerson = pins[code];
      currentTarget = assignments[currentPerson];

      document.getElementById("identityQuestion").textContent =
        `Are you ${currentPerson}?`;

      document.getElementById("confirmIdentity").style.display = "block";
    }

    function confirmIdentity(isYes) {
      document.getElementById("confirmIdentity").style.display = "none";

      if (!isYes) {
        document.getElementById("result").textContent =
          "Please enter the correct code.";
        return;
      }

      document.getElementById("readyCheck").style.display = "block";
    }

    function confirmReady(isYes) {
      document.getElementById("readyCheck").style.display = "none";

      if (!isYes) {
        document.getElementById("result").textContent =
          "Come back when you're ready.";
        return;
      }

      // CONFETTI
      confetti({
        particleCount: 200,
        spread: 70,
        origin: { y: 0.6 }
      });

      document.getElementById("result").textContent =
        "Your target is: " + currentTarget;
    }
  </script>

</body>
</html>
