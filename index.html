<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Randomizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 18px;
    }
    button {
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Target Randomizer</h1>

    <input id="nameInput" type="text" placeholder="Enter your name">
    <button onclick="startAssignment()">START</button>

    <div id="result"></div>
  </div>

  <script>
    const people = [
      "Kayden Hall", "Lucas Forker", "Trevor James", "Gabriel Medina",
      "Ben Elder", "Nick Haskins", "Aaron Joseph", "Jackson Neubauer",
      "Bianca Illescas Villa", "Max Gotcher", "Madison Dodge",
      "Nolan Garrison", "Brysun Perry", "Jack Smith", "David Sheldon",
      "Angelina Bryk", "Nicole Semenchuck", "Charlotte Humphrey"
    ];

    const peopleLower = people.map(p => p.toLowerCase());

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function assignTargets(list) {
      let targets;

      while (true) {
        targets = [...list];
        shuffle(targets);

        let valid = true;

        for (let i = 0; i < list.length; i++) {
          if (list[i] === targets[i]) {
            valid = false;
            break;
          }
          let partnerIndex = list.indexOf(targets[i]);
          if (partnerIndex !== -1 && targets[partnerIndex] === list[i]) {
            valid = false;
            break;
          }
        }

        if (valid) break;
      }

      let map = {};
      for (let i = 0; i < list.length; i++) {
        map[list[i]] = targets[i];
      }
      return map;
    }

    const assignments = assignTargets(peopleLower);

    function startAssignment() {
      const input = document.getElementById("nameInput").value.trim().toLowerCase();
      const result = document.getElementById("result");

      const index = peopleLower.indexOf(input);

      if (index === -1) {
        result.textContent = "Name not found.";
        return;
      }

      const targetLower = assignments[peopleLower[index]];
      const targetIndex = peopleLower.indexOf(targetLower);
      const targetProper = people[targetIndex];

      result.textContent = "Your target is: " + targetProper;
    }
  </script>

</body>
</html>
