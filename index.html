<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Randomizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 18px;
    }
    button {
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Target Randomizer</h1>

    <input id="nameInput" type="text" placeholder="Enter your name">
    <button onclick="startAssignment()">START</button>

    <div id="result"></div>
  </div>

  <script>
    const people = [
      "Kayden Hall", "Lucas Forker", "Trevor James", "Gabriel Medina",
      "Ben Elder", "Nick Haskins", "Aaron Joseph", "Jackson Neubauer",
      "Bianca Illescas Villa", "Max Gotcher", "Madison Dodge",
      "Nolan Garrison", "Brysun Perry", "Jack Smith", "David Sheldon",
      "Angelina Bryk", "Nicole Semenchuck", "Charlotte Humphrey"
    ];

    function assignTargets(list) {
      let targets = [...list];
      shuffle(targets);

      // Fix self-targeting
      for (let i = 0; i < list.length; i++) {
        if (list[i] === targets[i]) {
          let swap = (i + 1) % list.length;
          [targets[i], targets[swap]] = [targets[swap], targets[i]];
        }
      }

      let map = {};
      for (let i = 0; i < list.length; i++) {
        map[list[i]] = targets[i];
      }
      return map;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    const assignments = assignTargets(people);

    function startAssignment() {
      const name = document.getElementById("nameInput").value.trim();
      const result = document.getElementById("result");

      if (!assignments[name]) {
        result.textContent = "Name not found.";
        return;
      }

      result.textContent = "Your target is: " + assignments[name];
    }
  </script>

</body>
</html>
