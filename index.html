<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Randomizer (Fixed)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .container {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 18px;
    }
    button {
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Target Randomizer</h1>

    <input id="nameInput" type="text" placeholder="Enter your name">
    <button onclick="startAssignment()">START</button>

    <div id="result"></div>
  </div>

  <script>
    const people = [
      "Kayden Hall", "Lucas Forker", "Trevor James", "Gabriel Medina",
      "Ben Elder", "Nick Haskins", "Aaron Joseph", "Jackson Neubauer",
      "Bianca Illescas Villa", "Max Gotcher", "Madison Dodge",
      "Nolan Garrison", "Brysun Perry", "Jack Smith", "David Sheldon",
      "Angelina Bryk", "Nicole Semenchuck", "Charlotte Humphrey"
    ];

    const peopleLower = people.map(p => p.toLowerCase());

    // FIXED ASSIGNMENTS — NO RANDOMNESS
    const assignments = {
      "kayden hall": "lucas forker",
      "lucas forker": "trevor james",
      "trevor james": "gabriel medina",
      "gabriel medina": "ben elder",
      "ben elder": "nick haskins",
      "nick haskins": "aaron joseph",
      "aaron joseph": "jackson neubauer",
      "jackson neubauer": "bianca illescas villa",
      "bianca illescas villa": "max gotcher",
      "max gotcher": "madison dodge",
      "madison dodge": "nolan garrison",
      "nolan garrison": "brysun perry",
      "brysun perry": "jack smith",
      "jack smith": "david sheldon",
      "david sheldon": "angelina bryk",
      "angelina bryk": "nicole semenchuck",
      "nicole semenchuck": "charlotte humphrey",
      "charlotte humphrey": "kayden hall"
    };

    function startAssignment() {
      const input = document.getElementById("nameInput").value.trim().toLowerCase();
      const result = document.getElementById("result");

      if (!assignments[input]) {
        result.textContent = "Name not found.";
        return;
      }

      const targetLower = assignments[input];
      const targetIndex = peopleLower.indexOf(targetLower);
      const targetProper = people[targetIndex];

      result.textContent = "Your target is: " + targetProper;
    }
  </script>

</body>
</html>
